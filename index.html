<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #060606; 
            color: #f2f2f0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .container { max-width: 400px; margin: 0 auto; width: 100%; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .logo span { color: #c8ff3d; }
        .input-field { 
            width: 100%; 
            background: #0d0d0d; 
            border: 1px solid #1f1f1f; 
            border-radius: 10px; 
            padding: 15px; 
            color: white; 
            margin-bottom: 10px;
            font-size: 16px;
        }
        .btn { 
            background: #c8ff3d; 
            border: none; 
            border-radius: 10px; 
            padding: 15px; 
            color: #060606; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">SHADOW<span>PROXY</span></div>

    <input type="text" class="input-field" id="host" placeholder="IP или хост" value="47.79.119.13">
    <input type="text" class="input-field" id="port" placeholder="Порт" value="8080">
    <input type="text" class="input-field" id="ssid" placeholder="Имя Wi-Fi (SSID)" value="HUAWEI-7">

    <button class="btn" id="connectBtn">⚡ Включить прокси</button>
</div>

<script>
    function makeUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        }).toUpperCase();
    }

    document.getElementById('connectBtn').onclick = function() {
        const host = document.getElementById('host').value;
        const port = document.getElementById('port').value;
        const ssid = document.getElementById('ssid').value;
        
        const xml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadType</key>
            <string>com.apple.wifi.managed</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
            <key>PayloadIdentifier</key>
            <string>com.shadowvpn.wifi.${makeUUID()}</string>
            <key>PayloadUUID</key>
            <string>${makeUUID()}</string>
            <key>SSID_STR</key>
            <string>${ssid}</string>
            <key>EncryptionType</key>
            <string>WPA2</string>
            <key>Password</key>
            <string>H53477226i</string>
            <key>ProxyType</key>
            <string>Manual</string>
            <key>ProxyServer</key>
            <string>${host}</string>
            <key>ProxyServerPort</key>
            <integer>${port}</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key>
    <string>ShadowVPN</string>
    <key>PayloadIdentifier</key>
    <string>com.shadowvpn.profile.main</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>${makeUUID()}</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
</dict>
</plist>`;

        // Отправляем данные в Swift
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.mobileConfigHandler) {
            window.webkit.messageHandlers.mobileConfigHandler.postMessage(xml);
        } else {
            console.error("Swift bridge not found");
        }
    };
</script>
</body>
</html>
