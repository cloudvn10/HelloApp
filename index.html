<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #060606; color: #f2f2f0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        .logo { font-size: 24px; font-weight: 800; color: #f2f2f0; }
        .logo span { color: #c8ff3d; }
        
        .input-row { display: flex; gap: 10px; }
        .input-field { flex: 1; background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 10px; padding: 12px; color: white; outline: none; }
        .input-field:focus { border-color: #c8ff3d; }
        .input-field.small { max-width: 80px; }

        .btn {
            background: #c8ff3d; border: none; border-radius: 10px; padding: 12px;
            color: #060606; font-weight: 800; cursor: pointer; width: 100%;
        }
        .btn-off { background: #4a4a4a; color: #aaa; }
        
        #proxyList { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .proxy-card {
            background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 8px;
            padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .proxy-card:active { opacity: 0.7; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">SHADOW<span>PROXY</span></div>

    <div class="input-row">
        <input type="text" class="input-field" id="host" placeholder="IP или хост">
        <input type="text" class="input-field small" id="port" placeholder="Порт" value="8080">
    </div>
    <div class="input-row">
        <input type="text" class="input-field" id="ssid" placeholder="Имя Wi-Fi (SSID)">
    </div>
    
    <button class="btn" id="customBtn">Создать профиль для Wi-Fi</button>
    <button class="btn btn-off" id="offBtn">Отключить прокси</button>

    <hr style="border-color: #1a1a1a; margin: 10px 0;">

    <button class="btn" id="fetchBtn" style="background: #333; color: #fff;">Загрузить прокси с GitHub</button>
    <div id="proxyList"></div>
</div>

<script>
// Генератор UUID
function makeUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}

function escapeXML(str) { return String(str).replace(/[<>&'"]/g, function(c) { if(c === '<') return '&lt;'; if(c === '>') return '&gt;'; if(c === '&') return '&amp;'; if(c === "'") return '&apos;'; return '&quot;'; }); }

// Логика создания Wi-Fi профиля
function buildMobileConfig(host, port, label, ssid) {
    const payloadUUID = makeUUID();
    const safeLabel = escapeXML(label);
    const safeHost = escapeXML(host);
    const safeSsid = escapeXML(ssid);
    return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
  <key>PayloadContent</key><array><dict>
      <key>PayloadType</key><string>com.apple.wifi.managed</string>
      <key>PayloadVersion</key><integer>1</integer>
      <key>PayloadIdentifier</key><string>com.shadowvpn.wifi.${payloadUUID}</string>
      <key>PayloadUUID</key><string>${payloadUUID}</string>
      <key>PayloadDisplayName</key><string>ShadowVPN - ${safeLabel}</string>
      <key>SSID_STR</key><string>${safeSsid}</string>
      <key>EncryptionType</key><string>WPA2</string>
      <key>ProxyType</key><string>Manual</string>
      <key>ProxyServer</key><string>${safeHost}</string>
      <key>ProxyServerPort</key><integer>${parseInt(port)}</integer>
  </dict></array>
  <key>PayloadDisplayName</key><string>ShadowVPN</string>
  <key>PayloadIdentifier</key><string>com.shadowvpn.profile.main</string>
  <key>PayloadRemovalDisallowed</key><false/>
  <key>PayloadType</key><string>Configuration</string>
  <key>PayloadUUID</key><string>${makeUUID()}</string>
  <key>PayloadVersion</key><integer>1</integer>
</dict></plist>`;
}

function buildOffConfig() {
    return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
  <key>PayloadContent</key><array></array>
  <key>PayloadDisplayName</key><string>ShadowVPN OFF</string>
  <key>PayloadIdentifier</key><string>com.shadowvpn.profile.main</string>
  <key>PayloadRemovalDisallowed</key><false/>
  <key>PayloadType</key><string>Configuration</string>
  <key>PayloadUUID</key><string>a1b2c3d4-0000-4000-8000-000000000001</string>
  <key>PayloadVersion</key><integer>1</integer>
</dict></plist>`;
}

function downloadConfig(xml, filename) {
    const base64 = btoa(unescape(encodeURIComponent(xml)));
    const dataUrl = 'data:application/x-apple-aspen-config;base64,' + base64;
    window.location.href = dataUrl;
}

document.getElementById('customBtn').onclick = () => {
    const host = document.getElementById('host').value.trim();
    const port = document.getElementById('port').value.trim() || '8080';
    const ssid = document.getElementById('ssid').value.trim();
    if (!host || !ssid) { alert('Введи SSID и хост'); return; }
    downloadConfig(buildMobileConfig(host, port, 'Custom', ssid), 'ShadowVPN.mobileconfig');
};

document.getElementById('offBtn').onclick = () => {
    downloadConfig(buildOffConfig(), 'ShadowVPN-OFF.mobileconfig');
};

// ======= ЛОГИКА ЗАГРУЗКИ СПИСКА ПРОКСИ =======
const proxyListEl = document.getElementById('proxyList');
const fetchBtn = document.getElementById('fetchBtn');

fetchBtn.onclick = async () => {
    proxyListEl.innerHTML = '<div style="color: #888;">Загрузка списка...</div>';
    fetchBtn.disabled = true;
    
    try {
        const response = await fetch('https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/http.txt');
        const text = await response.text();
        const proxies = text.split('\n').filter(line => line.trim() !== '');
        
        proxyListEl.innerHTML = '';
        
        proxies.slice(0, 20).forEach(line => {
            const [host, port] = line.split(':');
            if(!host || !port) return;

            const card = document.createElement('div');
            card.className = 'proxy-card';
            
            card.innerHTML = `<span>${host}:${port}</span>`;

            card.onclick = () => {
                document.getElementById('host').value = host;
                document.getElementById('port').value = port;
                alert('Данные вставлены! Теперь введи SSID и нажми "Создать профиль"');
            };

            proxyListEl.appendChild(card);
        });
    } catch(e) {
        proxyListEl.innerHTML = '<div style="color: red;">Ошибка загрузки списка. Проверь интернет.</div>';
    } finally {
        fetchBtn.disabled = false;
    }
};
</script>
</body>
</html>
