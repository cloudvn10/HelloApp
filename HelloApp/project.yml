name: ShadowVPN
options:
  bundleIdPrefix: com.shadowvpn
  deploymentTarget:
    iOS: "14.0"
targets:
  ShadowVPN:
    type: application
    platform: iOS
    sources: [ShadowVPN]
    info:
      path: ShadowVPN/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shadowvpn.app
        PRODUCT_NAME: ShadowVPN
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
